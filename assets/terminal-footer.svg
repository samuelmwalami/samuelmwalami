<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="80" fill="#07090c"/>

  <!-- Line 1: $ prompt + command -->
  <text x="30" y="36" font-family="'Courier New', Courier, monospace" font-size="13">
    <tspan fill="#7aab8a" letter-spacing="0.3">$</tspan>
    <tspan fill="#475460"> init 0</tspan>
  </text>

  <!-- Line 2: blank (Y=57 is skipped) -->

  <!-- Line 3: I-beam cursor at the beginning -->
  <rect x="30" y="72" width="2" height="12" fill="#7aab8a">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Line 3: tagline -->
  <text x="38" y="78" font-family="'Courier New', Courier, monospace" font-size="12" fill="#4a5560" letter-spacing="0.3">building systems that run quietly in the background.</text>
</svg>