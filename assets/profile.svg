<svg width="680" height="440" viewBox="0 0 680 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }
    </style>
    <!-- subtle scanlines -->
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="white" opacity="0.012"/>
    </pattern>
    <!-- clip path to keep rounded corners everywhere -->
    <clipPath id="terminalClip">
      <rect width="680" height="440" rx="5" ry="5"/>
    </clipPath>
  </defs>

  <!-- Group clipped to rounded terminal shape -->
  <g clip-path="url(#terminalClip)">
    <!-- Terminal window bg -->
    <rect width="680" height="440" fill="#040607"/>
    <!-- border -->
    <rect width="680" height="440" rx="5" ry="5" fill="none" stroke="rgba(127,255,158,0.1)" stroke-width="1"/>
    <!-- scanlines -->
    <rect width="680" height="440" fill="url(#scan)"/>

    <!-- ── title bar ── -->
    <rect width="680" height="36" rx="5" ry="5" fill="rgba(255,255,255,0.02)"/>
    <rect y="18" width="680" height="18" fill="rgba(255,255,255,0.02)"/>
    <rect y="36" width="680" height="1" fill="rgba(127,255,158,0.1)"/>

    <!-- traffic lights -->
    <circle cx="22" cy="18" r="5" fill="#2e1010" stroke="#4a1818" stroke-width="1"/>
    <circle cx="42" cy="18" r="5" fill="#2e2508" stroke="#4a3e10" stroke-width="1"/>
    <circle cx="62" cy="18" r="5" fill="#0c2610" stroke="#183e18" stroke-width="1"/>

    <!-- title -->
    <text x="340" y="22" font-size="11" fill="#dde6ec" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">PROFILE</text>

    <!-- ── Line Number Gutter ── -->
    <rect x="0" y="36" width="40" height="404" fill="rgba(0,0,0,0.15)"/>
    <rect x="40" y="36" width="1" height="404" fill="rgba(71,84,96,0.25)"/>

    <!-- Line Numbers (right‑aligned) -->
    <text font-size="11" fill="#2c3840" text-anchor="end">
      <tspan x="30" y="70">1</tspan>
      <tspan x="30" y="92">2</tspan>
      <tspan x="30" y="114">3</tspan>
      <tspan x="30" y="136">4</tspan>
      <tspan x="30" y="158">5</tspan>
      <tspan x="30" y="180">6</tspan>
      <tspan x="30" y="202">7</tspan>
      <tspan x="30" y="224">8</tspan>
      <tspan x="30" y="246">9</tspan>
      <tspan x="30" y="268">10</tspan>
      <tspan x="30" y="290">11</tspan>
      <tspan x="30" y="312">12</tspan>
      <tspan x="30" y="334">13</tspan>
      <tspan x="30" y="356">14</tspan>
      <tspan x="30" y="378">15</tspan>
      <tspan x="30" y="400">16</tspan>
      <tspan x="30" y="417">&#8203;</tspan>
    </text>

    <!-- ── TOML Content ── -->

    <!-- Line 1: comment -->
    <text x="50" y="70" font-size="12.5" fill="#475460"># WHO_AM_I</text>

    <!-- Line 2: [profile] -->
    <text x="50" y="92" font-size="12.5">
      <tspan fill="#7fff9e">[profile]</tspan>
    </text>

    <!-- Line 3: name -->
    <text x="50" y="114" font-size="12.5">
      <tspan fill="#dde6ec">name</tspan>
      <tspan fill="#475460">    = </tspan>
      <tspan fill="#7fff9e">"Samuel Mwalami"</tspan>
    </text>

    <!-- Line 4: role -->
    <text x="50" y="136" font-size="12.5">
      <tspan fill="#dde6ec">role</tspan>
      <tspan fill="#475460">    = </tspan>
      <tspan fill="#7fff9e">"Software Engineer"</tspan>
    </text>

    <!-- Line 5: domain -->
    <text x="50" y="158" font-size="12.5">
      <tspan fill="#dde6ec">domain</tspan>
      <tspan fill="#475460">  = </tspan>
      <tspan fill="#7fff9e">"Backend &amp; Systems"</tspan>
    </text>

    <!-- Line 6: empty -->

    <!-- Line 7: [focus] -->
    <text x="50" y="202" font-size="12.5">
      <tspan fill="#7fff9e">[focus]</tspan>
    </text>

    <!-- Line 8: areas -->
    <text x="50" y="224" font-size="12.5">
      <tspan fill="#dde6ec">areas</tspan>
      <tspan fill="#475460">   = [</tspan>
    </text>

    <!-- Line 9: Systems Design -->
    <text x="50" y="246" font-size="12.5">
      <tspan fill="#475460">  </tspan>
      <tspan fill="#7fff9e">"Systems Design"</tspan>
      <tspan fill="#475460">,</tspan>
    </text>

    <!-- Line 10: Backend Infrastructure -->
    <text x="50" y="268" font-size="12.5">
      <tspan fill="#475460">  </tspan>
      <tspan fill="#7fff9e">"Backend Infrastructure"</tspan>
      <tspan fill="#475460">,</tspan>
    </text>

    <!-- Line 11: APIs -->
    <text x="50" y="290" font-size="12.5">
      <tspan fill="#475460">  </tspan>
      <tspan fill="#7fff9e">"APIs"</tspan>
      <tspan fill="#475460">,</tspan>
    </text>

    <!-- Line 12: Web and Mobile Technologies -->
    <text x="50" y="312" font-size="12.5">
      <tspan fill="#475460">  </tspan>
      <tspan fill="#7fff9e">"Web and Mobile Technologies"</tspan>
      <tspan fill="#475460">,</tspan>
    </text>

    <!-- Line 13: Performance Testing -->
    <text x="50" y="334" font-size="12.5">
      <tspan fill="#475460">  </tspan>
      <tspan fill="#7fff9e">"Performance Testing"</tspan>
    </text>

    <!-- Line 14: closing bracket -->
    <text x="50" y="356" font-size="12.5">
      <tspan fill="#475460">]</tspan>
    </text>

    <!-- Line 15: empty line with blinking cursor -->
    <rect x="50" y="365" width="2" height="15" fill="#7fff9e">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Line 16: empty (no text) — just a blank line -->

    <!-- ── Neovim Status Bar (INSERT mode) ── -->
    <rect x="0" y="422" width="680" height="18" fill="rgba(127,255,158,0.07)"/>
    <rect x="0" y="422" width="680" height="1" fill="rgba(127,255,158,0.12)"/>

    <!-- INSERT mode pill (blue) -->
    <rect x="0" y="422" width="60" height="18" fill="#7e9cd8" rx="0"/>
    <text x="30" y="431" font-size="10" fill="#16161d" text-anchor="middle" dominant-baseline="middle" font-weight="bold" letter-spacing="0.5">INSERT</text>

    <!-- File name -->
    <text x="68" y="431" font-size="10.5" fill="#dcd7ba" dominant-baseline="middle" letter-spacing="0.3">WHO_AM_I.toml</text>

    <!-- File info right -->
    <text x="620" y="431" font-size="10" fill="#54546d" text-anchor="end" dominant-baseline="middle" letter-spacing="0.3">toml  ·  UTF-8  ·  15:1</text>
  </g>
</svg>