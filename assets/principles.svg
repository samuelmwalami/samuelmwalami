<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }
    </style>
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="white" opacity="0.012"/>
    </pattern>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="terminalClip">
      <path d="M 5 0 L 675 0 Q 680 0 680 5 L 680 460 L 0 460 L 0 5 Q 0 0 5 0 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#terminalClip)">
    <!-- window bg -->
    <rect width="680" height="460" fill="#040607"/>
    <rect width="680" height="460" rx="5" ry="5" fill="none" stroke="rgba(127,255,158,0.1)" stroke-width="1"/>
    <rect width="680" height="460" rx="5" ry="5" fill="url(#scan)"/>

    <!-- title bar -->
    <rect width="680" height="36" rx="5" ry="5" fill="rgba(255,255,255,0.02)"/>
    <rect y="18" width="680" height="18" fill="rgba(255,255,255,0.02)"/>
    <rect y="36" width="680" height="1" fill="rgba(127,255,158,0.1)"/>

    <!-- traffic lights -->
    <circle cx="22" cy="18" r="5" fill="#2e1010" stroke="#4a1818" stroke-width="1"/>
    <circle cx="42" cy="18" r="5" fill="#2e2508" stroke="#4a3e10" stroke-width="1"/>
    <circle cx="62" cy="18" r="5" fill="#0c2610" stroke="#183e18" stroke-width="1"/>

    <!-- title -->
    <text x="340" y="22" font-size="11" fill="#dde6ec" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">PRINCIPLES</text>

    <!-- prompt -->
    <text x="22" y="66" font-size="13" fill="#7fff9e" letter-spacing="0.3">$</text>
    <text x="36" y="66" font-size="12" fill="#475460">tree -f PRINCIPLES</text>

    <!-- tree root -->
    <text x="22" y="92" font-size="12.5" fill="#dde6ec">PRINCIPLES/</text>

    <!-- 01 -->
    <text x="22" y="116" font-size="12.5">
      <tspan fill="#475460">├── </tspan><tspan fill="#9eaab4">01_</tspan><tspan fill="#dde6ec">design_before_building/</tspan>
    </text>
    <text x="22" y="133" font-size="12.5">
      <tspan fill="#475460">│   └── </tspan><tspan fill="#7fff9e">architecture outlasts the code that implements it</tspan>
    </text>

    <!-- 02 -->
    <text x="22" y="157" font-size="12.5">
      <tspan fill="#475460">├── </tspan><tspan fill="#9eaab4">02_</tspan><tspan fill="#dde6ec">prototype_before_optimising/</tspan>
    </text>
    <text x="22" y="174" font-size="12.5">
      <tspan fill="#475460">│   └── </tspan><tspan fill="#7fff9e">[MVP] prove viability before engineering to perfection</tspan>
    </text>

    <!-- 03 -->
    <text x="22" y="198" font-size="12.5">
      <tspan fill="#475460">├── </tspan><tspan fill="#9eaab4">03_</tspan><tspan fill="#dde6ec">measure_before_optimising/</tspan>
    </text>
    <text x="22" y="215" font-size="12.5">
      <tspan fill="#475460">│   └── </tspan><tspan fill="#7fff9e">intuition is wrong more often than profilers are</tspan>
    </text>

    <!-- 04 -->
    <text x="22" y="239" font-size="12.5">
      <tspan fill="#475460">└── </tspan><tspan fill="#9eaab4">04_</tspan><tspan fill="#dde6ec">clean_code/</tspan>
    </text>
    <text x="22" y="256" font-size="12.5">
      <tspan fill="#475460">    └── </tspan><tspan fill="#7fff9e">the next person to read it might be you at 2am</tspan>
    </text>

    <!-- sudo init 0 -->
    <text x="22" y="300" font-size="13" letter-spacing="0.3">
      <tspan fill="#7fff9e">$</tspan>
      <tspan fill="#475460"> sudo init 0</tspan>
    </text>

    <!-- I-beam cursor -->
    <rect x="22" y="325" width="2" height="15" fill="#7fff9e">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- tagline -->
    <text x="38" y="338" font-size="12" fill="#4a5560" letter-spacing="0.3">building systems that run quietly in the background.</text>

    <!-- signature -->
    <text x="340" y="395" font-size="14" fill="#ffffff" font-weight="bold" text-anchor="middle" filter="url(#glow)" letter-spacing="0.5">samuelmwalami@dev</text>
  </g>
</svg>