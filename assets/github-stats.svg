<svg width="680" height="100" viewBox="0 0 680 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'Courier New', Courier, monospace; }
    </style>
    <!-- subtle scanlines -->
    <pattern id="scan" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="white" opacity="0.012"/>
    </pattern>
    <!-- clip path: rounded top corners, flat bottom -->
    <clipPath id="terminalClip">
      <path d="M5 0 H675 Q680 0 680 5 V100 H0 V5 Q0 0 5 0 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#terminalClip)">
    <!-- window bg -->
    <path d="M5 0 H675 Q680 0 680 5 V100 H0 V5 Q0 0 5 0 Z" fill="#040607"/>
    <!-- border -->
    <path d="M5 0 H675 Q680 0 680 5 V100 H0 V5 Q0 0 5 0 Z" fill="none" stroke="rgba(127,255,158,0.1)" stroke-width="1"/>
    <!-- scanlines -->
    <rect width="680" height="100" fill="url(#scan)"/>

    <!-- ── title bar ── -->
    <path d="M5 0 H675 Q680 0 680 5 V36 H0 V5 Q0 0 5 0 Z" fill="rgba(255,255,255,0.02)"/>
    <rect y="18" width="680" height="18" fill="rgba(255,255,255,0.02)"/>
    <rect y="36" width="680" height="1" fill="rgba(127,255,158,0.1)"/>

    <!-- traffic lights -->
    <circle cx="22" cy="18" r="5" fill="#2e1010" stroke="#4a1818" stroke-width="1"/>
    <circle cx="42" cy="18" r="5" fill="#2e2508" stroke="#4a3e10" stroke-width="1"/>
    <circle cx="62" cy="18" r="5" fill="#0c2610" stroke="#183e18" stroke-width="1"/>

    <!-- title -->
    <text x="340" y="22" font-size="11" fill="#dde6ec" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">GITHUB STATS</text>

    <!-- ── prompt line 1 ── -->
    <text x="22" y="66" font-size="13" fill="#7fff9e" letter-spacing="0.3">$</text>
    <text x="36" y="66" font-size="12" fill="#475460">./GITHUB_STATS &amp;</text>



    <!-- I-beam cursor (blinking) -->
    <rect x="36" y="75" width="2" height="15" fill="#7fff9e">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>